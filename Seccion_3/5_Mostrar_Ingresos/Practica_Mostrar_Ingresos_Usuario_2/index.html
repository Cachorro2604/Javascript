<!DOCTYPE html>

<html>
    <head>
        <title>Ingresos de Usuario 2</title>
    </head>
    <body>
        <input type="text" id="inputTexto" value="Luis Miguel">
        <button onclick="mostrarTexto()">Click aqui</button>
        <h1 id="titulo"></h1>

        <script>
            function mostrarTexto(){
                let elementoNombre = document.getElementById("inputTexto"); 
                let elementTitulo = document.getElementById("titulo");
                let mensaje = "Mi artista favorito es " + elementoNombre.value
                
                elementTitulo.textContent = mensaje;



            }

        </script>
    </body>


</html>
